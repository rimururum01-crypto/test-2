<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân hàng Trắc nghiệm Tin học 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAydBUQ9p7ZdZwnzyQn2zFtxo0wAUghbQM", authDomain: "nckh-5722c.firebaseapp.com", projectId: "nckh-5722c", storageBucket: "nckh-5722c.firebasestorage.app", messagingSenderId: "105437201456", appId: "1:105437201456:web:739bfbce5a560d80e319f5" };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
    </script>

    <style>
        /* CSS của bạn */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #main-app { display: none; padding: 24px; display: flex; gap: 24px; }
        .sidebar { width: 320px; background: white; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; }
        .main-content { flex: 1; background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; }
    </style>
</head>
<body>

    <!-- Màn hình Đăng nhập -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2>Đăng nhập Hệ thống</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button onclick="authAction(false)">Đăng nhập</button>
            <button onclick="authAction(true)" style="background:#28a745;">Đăng ký</button>
        </div>
    </div>

    <!-- Màn hình chính (App của bạn nằm ở đây) -->
    <div id="main-app">
        <aside class="sidebar">
            <button onclick="window.auth.signOut()" style="background:#ef4444;">Đăng xuất</button>
            <div id="level-list"></div>
        </aside>
        <main class="main-content">
            <h1>Chào mừng bạn đã đăng nhập!</h1>
            <div id="quiz-workspace"></div>
        </main>
    </div>

    <script>
        // Điều hướng đăng nhập
        window.auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        async function authAction(isRegister) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if (isRegister) await window.auth.createUserWithEmailAndPassword(email, pass);
                else await window.auth.signInWithEmailAndPassword(email, pass);
            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
